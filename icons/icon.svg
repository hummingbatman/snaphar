<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="SnapHAR">
  <title>SnapHAR</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3AA0FF"/>
      <stop offset="1" stop-color="#0B57A4"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#bg)"/>
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#sheen)"/>

  <!-- Network "waterfall": staggered request bars; the captured one is amber -->
  <g>
    <rect x="28" y="39" width="72" height="14" rx="7" fill="#ffffff"/>
    <rect x="40" y="61" width="46" height="14" rx="7" fill="#FFB020"/>
    <rect x="34" y="83" width="58" height="14" rx="7" fill="#ffffff" fill-opacity="0.92"/>
  </g>
</svg>
